name: PdM朝刊 - 毎朝7時配信

on:
  schedule:
    # 日本時間 朝7:00狙い。GitHub Actionsの遅延を考慮しUTC 21:00(JST 6:00)に設定
    - cron: '0 21 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  post-articles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch articles and post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/fetch_and_post.py
